services:
  # ─────────────────────────────────────────────────────────────
  # 웹 서비스 (Django + Gunicorn)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: community-web
    env: python
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn config.wsgi:application
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: community-db
          property: connectionString
      - key: SECRET_KEY
        value: "b3c6d8e9f0g1h2i3j4k5l6m7n8o9p0q1r2s3t4u5v6w7x8y9z0a1b2c3d4e5f6"

  # ─────────────────────────────────────────────────────────────
  # PostgreSQL 데이터베이스 (Free 플랜)
  # ─────────────────────────────────────────────────────────────
  - type: pserv
    name: community-db
    ipAddress: private
    plan: free
    postgresVersion: 15
