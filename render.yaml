services:
  # ─────────────────────────────────────────────────────────────
  # 웹 서비스 (Django + Gunicorn)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: community-web
    runtime: python
    plan: free
    buildCommand: >-
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate &&
      python manage.py loaddata apps/academic/fixtures/sample_events.json &&
      python manage.py loaddata apps/navigation/fixtures/shuttle_data_2026_spring.json
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false        # 대시보드에서 Supabase URL 또는 기존 Render DB URL 직접 입력
      - key: KAKAO_API_KEY
        sync: false
      - key: KAKAO_JS_KEY
        sync: false
      - key: ODSAY_API_KEY
        sync: false
      - key: SENTRY_DSN
        value: ""

  # ── PostgreSQL 블록 제거 ──────────────────────────────────────
  # Render 무료 플랜은 계정당 DB 1개 제한.
  # 기존 DB(Render 또는 Supabase)의 연결 URL을
  # DATABASE_URL 환경변수에 직접 입력하세요.
