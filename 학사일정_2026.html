<style>
  :root {

    --primary-light: #eff6ff;
    --text: #1e293b;
    --muted: #64748b;
    --sunday: #ef4444;
    --saturday: #3b82f6;
    --c-registration: #8b5cf6;
    --c-exam: #f59e0b;
    --c-vacation: #10b981;
    --c-event: #ec4899;
    --c-holiday: #ef4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 10px; }
  header h1 { font-size: 1.35rem; font-weight: 700; }
  header a { font-size: 0.78rem; color: var(--primary); text-decoration: none; }
  header a:hover { text-decoration: underline; }
  .legend { display: flex; gap: 14px; flex-wrap: wrap; padding: 12px 32px; background: var(--surface); border-bottom: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--muted); cursor: pointer; user-select: none; }
  .legend-item.off { opacity: 0.35; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .tabs { display: flex; gap: 4px; padding: 16px 32px 0; }
  .tab { padding: 8px 20px; border-radius: 8px 8px 0 0; border: 1px solid var(--border); border-bottom: none; background: var(--bg); cursor: pointer; font-size: 0.88rem; font-weight: 600; color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--surface); color: var(--primary); }
  .semester-panel { display: none; padding: 0 32px 32px; background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 8px 8px 8px; margin: 0 32px; }
  .semester-panel.active { display: block; }
  .months-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding-top: 24px; }
  .month-card { border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .month-header { background: var(--primary); color: #fff; padding: 10px 14px; font-weight: 700; font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
  .month-header small { font-weight: 400; font-size: 0.74rem; opacity: 0.85; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); padding: 8px; gap: 2px; }
  .cal-dow { text-align: center; font-size: 0.68rem; font-weight: 600; color: var(--muted); padding: 4px 0; }
  .cal-dow:first-child { color: var(--sunday); }
  .cal-dow:last-child { color: var(--saturday); }
  .cal-day { position: relative; text-align: center; padding: 5px 2px 14px; font-size: 0.78rem; border-radius: 6px; min-height: 36px; cursor: default; }
  .cal-day:not(.empty):hover { background: var(--primary-light); }
  .cal-day .num { display: block; font-weight: 500; line-height: 1; }
  .cal-day.sun .num { color: var(--sunday); }
  .cal-day.sat .num { color: var(--saturday); }
  .cal-day.today { background: var(--primary-light); }
  .cal-day.today .num { color: var(--primary); font-weight: 800; }
  .event-dots { display: flex; justify-content: center; gap: 2px; flex-wrap: wrap; position: absolute; bottom: 2px; left: 0; right: 0; }
  .event-dots .dot { width: 5px; height: 5px; }
  .schedule-list { padding: 20px 0 0; }
  .schedule-list h3 { font-size: 0.82rem; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.04em; }
  .schedule-table { width: 100%; border-collapse: collapse; font-size: 0.83rem; }
  .schedule-table th { text-align: left; padding: 8px 12px; background: var(--bg); color: var(--muted); font-weight: 600; font-size: 0.76rem; border-bottom: 1px solid var(--border); }
  .schedule-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .schedule-table tr:last-child td { border-bottom: none; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.7rem; font-weight: 600; color: #fff; }
  .badge-registration { background: var(--c-registration); }
  .badge-exam { background: var(--c-exam); }
  .badge-vacation { background: var(--c-vacation); }
  .badge-event { background: var(--c-event); }
  .badge-holiday { background: var(--c-holiday); }
  .note { font-size: 0.75rem; color: var(--muted); padding: 10px 0 0; }
  @media (max-width: 600px) {
    header, .legend, .tabs { padding-left: 16px; padding-right: 16px; }
    .semester-panel { margin: 0 16px; padding: 0 16px 24px; }
    .months-grid { grid-template-columns: 1fr; }
  }
</style>

  const hdr = document.createElement('div');
  hdr.className = 'month-header';
  hdr.innerHTML = `<span>${year}년 ${MONTH_KO[month]}</span><small>${year}.${String(month).padStart(2,'0')}</small>`;
  card.appendChild(hdr);
  const grid = document.createElement('div');
  grid.className = 'cal-grid';
  ['일','월','화','수','목','금','토'].forEach(d => {
    const el = document.createElement('div'); el.className = 'cal-dow'; el.textContent = d; grid.appendChild(el);
  });
  const first = new Date(year, month-1, 1);
  const lastDay = new Date(year, month, 0).getDate();
  let dow = first.getDay();
  for (let i = 0; i < dow; i++) {
    const el = document.createElement('div'); el.className = 'cal-day empty'; grid.appendChild(el);
  }
  for (let d = 1; d <= lastDay; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dayDow = dow % 7;
    const el = document.createElement('div');
    el.className = 'cal-day' + (dayDow===0?' sun':dayDow===6?' sat':'') + (dateStr===todayStr?' today':'');
    el.innerHTML = `<span class="num">${d}</span>`;
    const dayEvents = evMap[dateStr] || [];
    if (dayEvents.length) {
      const dotsEl = document.createElement('div');
      dotsEl.className = 'event-dots';
      dayEvents.slice(0,4).forEach(ev => {
        const dot = document.createElement('span');
        dot.className = 'dot';
        dot.style.background = COLORS[ev.type];
        dotsEl.appendChild(dot);
      });
      el.appendChild(dotsEl);
      el.title = dayEvents.map(e=>e.label).join('\n');
    }
    grid.appendChild(el);
    dow++;
  }
  card.appendChild(grid);
  return card;
}

function buildTable(semIdx) {
  const evMap = getEventsByDate();
  const sem = semesters[semIdx];
  const allRows = [];
  sem.months.forEach(([y,m]) => {
    const last = new Date(y,m,0).getDate();
    for (let d=1;d<=last;d++) {
      const ds = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if (evMap[ds]) evMap[ds].forEach(e => allRows.push({date:ds,...e}));
    }
  });
  const tbody = document.getElementById(`table-${semIdx}`);
  tbody.innerHTML = `<thead><tr><th>날짜</th><th>구분</th><th>일정</th></tr></thead>
    <tbody>${allRows.length===0
      ? '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--muted)">표시할 일정이 없습니다.</td></tr>'
      : allRows.map(e=>`<tr>
          <td style="white-space:nowrap;color:var(--muted)">${e.date}</td>
          <td><span class="badge badge-${e.type}">${LABELS[e.type]}</span></td>
          <td>${e.label}</td>
        </tr>`).join('')}
    </tbody>`;
}

function render() {
  const evMap = getEventsByDate();
  semesters.forEach((sem, idx) => {
    const grid = document.getElementById(`grid-${idx}`);
    grid.innerHTML = '';
    sem.months.forEach(([y,m]) => grid.appendChild(buildMonthCard(y, m, evMap)));
    buildTable(idx);
  });
}

function switchTab(idx) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===idx));
  document.querySelectorAll('.semester-panel').forEach((p,i) => p.classList.toggle('active', i===idx));
}

document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    const t = item.dataset.type;
    if (activeTypes.has(t)) { activeTypes.delete(t); item.classList.add('off'); }
    else { activeTypes.add(t); item.classList.remove('off'); }
    render();
  });
});

render();
</script>
</body>
</html>
