{% extends 'base.html' %}
{% load account %}

{% block title %}로그인 — MJU Navigate{% endblock %}

{% block content %}
<div class="max-w-md mx-auto mt-8">
  <div class="bg-white rounded-lg shadow-md p-8">
    <h1 class="text-2xl font-bold text-gray-900 mb-6 text-center">로그인</h1>

    <form method="post" class="space-y-4">
      {% csrf_token %}

      <!-- 이메일 입력 -->
      <div>
        <label for="id_login" class="block text-sm font-medium text-gray-700 mb-2">
          이메일
        </label>
        <input
          type="email"
          name="login"
          id="id_login"
          placeholder="이메일을 입력하세요"
          required
          autofocus
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
        />
      </div>

      <!-- 비밀번호 입력 -->
      <div>
        <label for="id_password" class="block text-sm font-medium text-gray-700 mb-2">
          비밀번호
        </label>
        <input
          type="password"
          name="password"
          id="id_password"
          placeholder="비밀번호를 입력하세요"
          required
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
        />
      </div>

      <!-- Remember Me -->
      <div class="flex items-center">
        <input
          type="checkbox"
          name="remember"
          id="id_remember"
          class="w-4 h-4 text-brand-500 border-gray-300 rounded focus:ring-2 focus:ring-brand-500"
        />
        <label for="id_remember" class="ml-2 text-sm text-gray-600">
          로그인 상태 유지
        </label>
      </div>

      <!-- 에러 메시지 표시 -->
      {% if form.non_field_errors %}
        <div class="bg-red-50 border border-red-200 rounded-lg p-3">
          {% for error in form.non_field_errors %}
            <p class="text-red-600 text-sm">{{ error }}</p>
          {% endfor %}
        </div>
      {% endif %}

      <!-- 로그인 버튼 -->
      <button
        type="submit"
        class="w-full py-2 bg-brand-500 text-white font-medium rounded-lg hover:bg-brand-600 transition-colors"
      >
        로그인
      </button>
    </form>

    <!-- 회원가입 & 비밀번호 재설정 -->
    <div class="mt-6 space-y-2 text-center text-sm">
      <p class="text-gray-600">
        계정이 없으신가요?
        <a href="{% url 'account_signup' %}" class="text-brand-500 font-semibold hover:underline">
          회원가입
        </a>
      </p>
      <p class="text-gray-600">
        <a href="{% url 'account_reset_password' %}" class="text-brand-500 font-semibold hover:underline">
          비밀번호 재설정
        </a>
      </p>
    </div>
  </div>
</div>
{% endblock %}
