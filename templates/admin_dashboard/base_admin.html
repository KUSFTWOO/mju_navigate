{% extends 'base.html' %}

{% block content %}
<div class="grid grid-cols-1 lg:grid-cols-4 gap-0 min-h-screen">
  <!-- 좌측 사이드바 -->
  <div class="lg:col-span-1 bg-brand-700 text-white p-6">
    <h2 class="text-2xl font-bold mb-6">📊 관리자 대시보드</h2>

    <nav class="space-y-2">
      <a href="{% url 'admin_dashboard:index' %}"
         class="block px-4 py-2 rounded-lg {% if request.resolver_match.url_name == 'index' %}bg-brand-500{% else %}hover:bg-brand-600{% endif %}">
        🏠 홈
      </a>
      <a href="{% url 'admin_dashboard:shuttle' %}"
         class="block px-4 py-2 rounded-lg {% if 'shuttle' in request.resolver_match.url_name %}bg-brand-500{% else %}hover:bg-brand-600{% endif %}">
        🚌 셔틀 관리
      </a>
      <a href="{% url 'admin_dashboard:academic' %}"
         class="block px-4 py-2 rounded-lg {% if 'academic' in request.resolver_match.url_name %}bg-brand-500{% else %}hover:bg-brand-600{% endif %}">
        📅 학사일정 관리
      </a>
      <a href="{% url 'admin_dashboard:users' %}"
         class="block px-4 py-2 rounded-lg {% if 'users' in request.resolver_match.url_name %}bg-brand-500{% else %}hover:bg-brand-600{% endif %}">
        👥 회원 관리
      </a>
    </nav>
  </div>

  <!-- 우측 콘텐츠 -->
  <div class="lg:col-span-3 p-6 bg-gray-50">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
